name: Build news.json

on:
  schedule:
    # Werktags früh morgens (UTC). ~06:30 CEST (Sommer) bzw. ~05:30 CET (Winter).
    - cron: "30 4 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

# Kein paralleler Lauf, damit Pushes sich nicht überholen.
concurrency:
  group: build-news
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build news.json
        run: node scripts/build-news.mjs

      - name: Commit & push, falls geändert
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --staged --quiet; then
            echo "Keine Änderungen an news.json."
          else
            git commit -m "Update news.json (automatisch)"
            git push
          fi
