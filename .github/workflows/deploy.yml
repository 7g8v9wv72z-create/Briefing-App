name: Build news & deploy to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    # Werktags früh morgens (UTC). ~06:30 CEST (Sommer) bzw. ~05:30 CET (Winter).
    - cron: "30 4 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write   # aktualisierte news.json committen
  pages: write      # Pages deployen
  id-token: write   # OIDC für Pages-Deploy

# Genau EIN Pages-Deployer, keine parallelen Deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build news.json
        run: node scripts/build-news.mjs

      - name: Commit news.json, falls geändert
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --staged --quiet; then
            echo "Keine Änderungen an news.json."
          else
            git commit -m "Update news.json (automatisch)"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
